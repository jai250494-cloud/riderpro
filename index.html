<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RiderPro Malaysia</title>
<style>
body{margin:0;background:#FF5C00;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:system-ui,sans-serif;color:#fff}
.logo{font-size:64px;margin-bottom:16px}
.name{font-size:28px;font-weight:900;margin-bottom:8px}
.sub{font-size:14px;opacity:0.8;margin-bottom:32px}
.bar{width:160px;height:5px;background:rgba(255,255,255,0.2);border-radius:99px;overflow:hidden}
.fill{height:100%;background:#fff;border-radius:99px;animation:load 2s ease forwards}
@keyframes load{from{width:0}to{width:100%}}
.msg{font-size:12px;opacity:0.6;margin-top:16px}
</style>
</head>
<body>
<div class="logo">🛵</div>
<div class="name">RiderPro Malaysia</div>
<div class="sub">Komisen Paling Rendah 🇲🇾</div>
<div class="bar"><div class="fill"></div></div>
<div class="msg">Memuatkan app...</div>
<script>
setTimeout(function(){
  // Load main app
  fetch('https://raw.githubusercontent.com/jai250494-cloud/riderpro/main/app.html')
  .then(r=>r.text())
  .then(html=>{
    document.open();
    document.write(html);
    document.close();
  })
  .catch(()=>{
    document.body.innerHTML='<div style="text-align:center;padding:40px;color:#fff"><div style="font-size:48px;margin-bottom:16px">🛵</div><div style="font-size:20px;font-weight:900;margin-bottom:8px">RiderPro Malaysia</div><div style="font-size:14px;opacity:0.8;margin-bottom:24px">Sila pastikan anda ada sambungan internet</div><button onclick="location.reload()" style="background:#fff;color:#FF5C00;border:none;padding:14px 28px;border-radius:14px;font-size:16px;font-weight:800;cursor:pointer">Cuba Lagi</button></div>';
  });
},1500);
</script>
</body>
</html>
